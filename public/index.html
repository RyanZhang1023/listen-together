<!DOCTYPE html>
<html>
<head>
    <title>Listen Together</title>
</head>
<body>
    <h2>🎵 Listen Together</h2>

    <input type="text" id="searchInput" placeholder="Search song..." />
    <button onclick="searchSong()">Search</button>

    <ul id="searchResults"></ul>

    <h3>Playlist</h3>
    <button onclick="toggleMode()">Toggle Order/Random</button>
    <ul id="playlist"></ul>

    <audio id="audio" controls></audio>
    <button onclick="playSong()">Play</button>
    <button onclick="pauseSong()">Pause</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const audio = document.getElementById("audio");
        let playlist = [];
        let currentIndex = 0;

        // Renders playlist UI
        function renderPlaylist() {
            const ul = document.getElementById("playlist");
            ul.innerHTML = "";
            playlist.forEach((song, index) => {
                const li = document.createElement("li");
                li.innerHTML = `
                    ${song.trackName} - ${song.artistName}
                    <button onclick="deleteSong(${index})">❌</button>
                    <button onclick="moveUp(${index})">⬆</button>
                    <button onclick="moveDown(${index})">⬇</button>
                `;
                ul.appendChild(li);
            });
        }

        function deleteSong(index) { socket.emit("deleteSong", index); } function moveUp(index) { if (index > 0) { socket.emit("moveSong", { from: index, to: index - 1 }); } } function moveDown(index) { if (index < playlist.length - 1) { socket.emit("moveSong", { from: index, to: index + 1 }); } } function toggleMode() { socket.emit("toggleMode"); }

        function searchSong() {
            const query = document.getElementById("searchInput").value;
            fetch(`https://itunes.apple.com/search?term=${query}&media=music`)
                .then(res => res.json())
                .then(data => {
                    const results = document.getElementById("searchResults");
                    results.innerHTML = "";
                    data.results.slice(0, 5).forEach(song => {
                        const li = document.createElement("li");
                        li.innerHTML = `
                            ${song.trackName} - ${song.artistName}
                            <button onclick='addSong(${JSON.stringify(song)})'>Add</button>
                        `;
                        results.appendChild(li);
                    });
                });
        }

        // Load current song into audio element
        function loadCurrentSong() {
            if (playlist.length === 0) {
                audio.src = "";
                return;
            }
            if (!playlist[currentIndex]?.previewUrl) return;

            audio.src = playlist[currentIndex].previewUrl;
            audio.load(); // Important: ensures the audio is fully loaded
        }

        // Play/pause controls
        function playSong() {
            if (playlist.length === 0) return;
            socket.emit("play", audio.currentTime);
        }
        function pauseSong() {
            socket.emit("pause", audio.currentTime);
        }

        function addSong(song) {
            if (song.previewUrl) {
                socket.emit("addSong", song);
            }
        }

        // Play next song
        audio.onended = () => {
            socket.emit("next");
        };

        socket.on("updatePlaylist", (updated) => {
            // Preserve the current song if still in the updated playlist
            const currentSongId = playlist[currentIndex]?.trackId; // unique id
            playlist = updated;
            renderPlaylist();

            // Find new index of the current song in updated playlist
            const newIndex = playlist.findIndex(s => s.trackId === currentSongId);
            if (newIndex !== -1) {
                currentIndex = newIndex; // keep playing the same song
            } else {
                // Current song deleted or playlist empty, reset
                currentIndex = 0;
            }

            loadCurrentSong();
        });

        socket.on("syncState", (state) => {
            playlist = state.playlist;
            currentIndex = state.currentIndex;
            renderPlaylist();
            loadCurrentSong();
        });

        socket.on("play", (time) => {
            audio.currentTime = time;
            audio.play().catch(() => {});
        });

        socket.on("pause", (time) => {
            audio.currentTime = time;
            audio.pause();
        });

        socket.on("next", (index) => {
            if (playlist.length === 0) return;
            currentIndex = index;

            // Safety: clamp index
            if (!playlist[currentIndex]) currentIndex = 0;

            loadCurrentSong();
            audio.play().catch(() => {});
        });
    </script>
</body>
</html>
