<!DOCTYPE html>
<html>
<head>
    <title>Listen Together</title>
</head>
<body>
    <h2>🎵 Listen Together</h2>

    <input type="text" id="searchInput" placeholder="Search song..." />
    <button onclick="searchSong()">Search</button>

    <ul id="searchResults"></ul>

    <h3>Playlist</h3>
    <button onclick="toggleMode()">Toggle Order/Random</button>
    <ul id="playlist"></ul>

    <audio id="audio" controls></audio>
    <button onclick="playSong()">Play</button>
    <button onclick="pauseSong()">Pause</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const audio = document.getElementById("audio");
        let playlist = [];
        let currentIndex = 0;

        // Renders playlist UI
        function renderPlaylist() {
            const ul = document.getElementById("playlist");
            ul.innerHTML = "";
            playlist.forEach((song, index) => {
                const li = document.createElement("li");
                li.innerHTML = `
                    ${song.trackName} - ${song.artistName}
                    <button onclick="deleteSong(${index})">❌</button>
                    <button onclick="moveUp(${index})">⬆</button>
                    <button onclick="moveDown(${index})">⬇</button>
                `;
                ul.appendChild(li);
            });
        }

        function searchSong() {
            const query = document.getElementById("searchInput").value;
            fetch(`https://itunes.apple.com/search?term=${query}&media=music`)
                .then(res => res.json())
                .then(data => {
                    const results = document.getElementById("searchResults");
                    results.innerHTML = "";
                    data.results.slice(0, 5).forEach(song => {
                        const li = document.createElement("li");
                        li.innerHTML = `
                            ${song.trackName} - ${song.artistName}
                            <button onclick='addSong(${JSON.stringify(song)})'>Add</button>
                        `;
                        results.appendChild(li);
                    });
                });
        }

        // Load current song into audio element
        function loadCurrentSong() {
            if (playlist.length === 0) {
                audio.src = "";
                return;
            }
            if (!playlist[currentIndex]?.previewUrl) return;

            audio.src = playlist[currentIndex].previewUrl;
            audio.load(); // Important: ensures the audio is fully loaded
        }

        // Play/pause controls
        function playSong() {
            if (playlist.length === 0) return;
            socket.emit("play", audio.currentTime);
        }
        function pauseSong() {
            socket.emit("pause", audio.currentTime);
        }

        function addSong(song) {
            if (song.previewUrl) {
                socket.emit("addSong", song);
            }
        }

        // Play next song
        audio.onended = () => {
            socket.emit("next");
        };

        // Socket handlers
        socket.on("updatePlaylist", (updated) => {
            playlist = updated;
            renderPlaylist();
            if (currentIndex >= playlist.length) currentIndex = 0;
            loadCurrentSong();
        });

        socket.on("syncState", (state) => {
            playlist = state.playlist;
            currentIndex = state.currentIndex;
            renderPlaylist();
            loadCurrentSong();
        });

        socket.on("play", (time) => {
            audio.currentTime = time;
            audio.play().catch(() => {});
        });

        socket.on("pause", (time) => {
            audio.currentTime = time;
            audio.pause();
        });

        socket.on("next", (index) => {
            if (playlist.length === 0) return;
            currentIndex = index;

            // Safety: clamp index
            if (!playlist[currentIndex]) currentIndex = 0;

            loadCurrentSong();
            audio.play().catch(() => {});
        });
    </script>
</body>
</html>
