<!DOCTYPE html>
<html>
<head>
    <title>Listen Together</title>
</head>
<body>
    <h2>🎵 Listen Together</h2>

    <input type="text" id="searchInput" placeholder="Search song..." />
    <button onclick="searchSong()">Search</button>

    <ul id="searchResults"></ul>

    <h3>Playlist</h3>
    <button onclick="toggleMode()">Toggle Order/Random</button>
    <ul id="playlist"></ul>

    <audio id="audio" controls></audio>
    <button onclick="playSong()">Play</button>
    <button onclick="pauseSong()">Pause</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const audio = document.getElementById("audio");
        let playlist = [];
        let currentIndex = 0;

        function renderPlaylist() {
            const ul = document.getElementById("playlist");
            ul.innerHTML = "";
            playlist.forEach((song, index) => {
                const li = document.createElement("li");
                li.innerHTML = `
                    ${song.trackName} - ${song.artistName}
                    <button onclick="deleteSong(${index})">❌</button>
                    <button onclick="moveUp(${index})">⬆</button>
                    <button onclick="moveDown(${index})">⬇</button>
                `;
                ul.appendChild(li);
            });
        }

        function deleteSong(index) {
            socket.emit("deleteSong", index);
        }

        function moveUp(index) {
            if (index > 0) {
                socket.emit("moveSong", { from: index, to: index - 1 });
            }
        }

        function moveDown(index) {
            if (index < playlist.length - 1) {
                socket.emit("moveSong", { from: index, to: index + 1 });
            }
        }

        function toggleMode() {
            socket.emit("toggleMode");
        }

        function searchSong() {
            const query = document.getElementById("searchInput").value;
            fetch(`https://itunes.apple.com/search?term=${query}&media=music`)
                .then(res => res.json())
                .then(data => {
                    const results = document.getElementById("searchResults");
                    results.innerHTML = "";
                    data.results.slice(0, 5).forEach(song => {
                        const li = document.createElement("li");
                        li.innerHTML = `
                            ${song.trackName} - ${song.artistName}
                            <button onclick='addSong(${JSON.stringify(song)})'>Add</button>
                        `;
                        results.appendChild(li);
                    });
                });
        }

        function addSong(song) {
            if (song.previewUrl) {
                socket.emit("addSong", song);
            }
        }

        socket.on("updatePlaylist", (updated) => {
            playlist = updated;
            renderPlaylist();

            // If currentIndex is invalid (e.g., deleted last song), reset it
            if (currentIndex >= playlist.length) currentIndex = 0;

            // Always reload current song
            loadCurrentSong();
        });

        socket.on("syncState", (state) => {
            playlist = state.playlist;
            currentIndex = state.currentIndex;
            renderPlaylist();
            loadCurrentSong();  // <--- important!
        });

        socket.on("play", (time) => {
            audio.currentTime = time;
            audio.play();
        });

        socket.on("pause", (time) => {
            audio.currentTime = time;
            audio.pause();
        });

        audio.addEventListener("ended", () => {
            socket.emit("next");
        });

        socket.on("next", (index) => {
            currentIndex = index;
            loadCurrentSong();
            audio.play().catch(() => {}); // prevent browser autoplay errors
        });

        function playSong() {
            socket.emit("play", audio.currentTime);
        }

        function pauseSong() {
            socket.emit("pause", audio.currentTime);
        }

        function playCurrent() {
            if (playlist.length === 0) return;
            audio.src = playlist[currentIndex].previewUrl;
            audio.play();
        }

        function loadCurrentSong() {
            if (playlist.length === 0) return;

            const song = playlist[currentIndex];
            if (!song || !song.previewUrl) return;

            audio.src = song.previewUrl;
            audio.load(); // Important!

            // Remove previous listeners to avoid multiple triggers
            audio.onended = null;

            // Attach ended listener AFTER setting src
            audio.onended = () => {
                console.log("Song ended detected!");
                socket.emit("next");
            };
        }

    </script>
</body>
</html>
