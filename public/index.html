<!DOCTYPE html>
<html>
<head>
    <title>Listen Together</title>
</head>
<body>
    <h2>🎵 Listen Together</h2>

    <input type="text" id="searchInput" placeholder="Search song..." />
    <button onclick="searchSong()">Search</button>

    <ul id="searchResults"></ul>

    <h3>Playlist</h3>
    <button onclick="toggleMode()">Toggle Order/Random</button>
    <ul id="playlist"></ul>

    <audio id="audio" controls></audio>
    <button onclick="playSong()">Play</button>
    <button onclick="pauseSong()">Pause</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const API_BASE = "https://qqmusic-api.onrender.com:3001"; // Replace with your Render Koa API URL
        const socket = io();
        const audio = document.getElementById("audio");
        let playlist = [];
        let currentIndex = 0;
        let mode = "ordered"; // synced with server

        // --- Render playlist ---
        function renderPlaylist() {
            const ul = document.getElementById("playlist");
            ul.innerHTML = "";
            playlist.forEach((song, index) => {
                const li = document.createElement("li");
                li.innerHTML = `
                    ${song.trackName} - ${song.artistName}
                    <button onclick="deleteSong(${index})">❌</button>
                    <button onclick="moveUp(${index})">⬆</button>
                    <button onclick="moveDown(${index})">⬇</button>
                `;
                ul.appendChild(li);
            });
        }

        // --- Playlist controls ---
        function deleteSong(index) { socket.emit("deleteSong", index); }
        function moveUp(index) { if (index > 0) socket.emit("moveSong", { from: index, to: index - 1 }); }
        function moveDown(index) { if (index < playlist.length - 1) socket.emit("moveSong", { from: index, to: index + 1 }); }
        function toggleMode() { socket.emit("toggleMode"); }

        // --- Search songs ---
        function searchSong() {
            const query = document.getElementById("searchInput").value;

            fetch(`/api/search?keyword=${encodeURIComponent(query)}`)
                .then(res => {
                    console.log("Response status:", res.status);           // ← very important
                    console.log("Content-Type:", res.headers.get("content-type"));

                    if (!res.ok) {
                        throw new Error(`HTTP error ${res.status}`);
                    }

                    if (!res.headers.get("content-type")?.includes("application/json")) {
                        console.error("Response is NOT JSON. Raw content above ↑");
                        throw new Error("Not JSON");
                    }

                    // Only now try to parse
                    const data = JSON.parse(text);
                    const results = document.getElementById("searchResults");
                    results.innerHTML = "";

                    data.forEach(song => {

                        const songName = song.songname || song.name || "Unknown Title";
                        const songMid = song.songmid;
                        const artists = song.singer
                            ? song.singer.map(s => s.name).join(", ")
                            : "Unknown Artist";

                        const li = document.createElement("li");
                        li.textContent = `${songName} - ${artists}`;

                        const btn = document.createElement("button");
                        btn.textContent = "Add";

                        btn.addEventListener("click", () => {
                            socket.emit("addSong", {
                                songmid: songMid,
                                trackName: songName,
                                artistName: artists,
                                previewUrl: `/api/getMusicUrl?songmid=${songMid}`
                            });
                        });

                        li.appendChild(btn);
                        results.appendChild(li);
                    });
                });
        }

        function addSong(song) { if (song.previewUrl) { socket.emit("addSong", song); } }

        // --- Load current song into audio ---
        function loadCurrentSong() {
            if (!playlist[currentIndex]?.previewUrl) {
                audio.src = "";
                return;
            }
            audio.src = playlist[currentIndex].previewUrl;
            audio.load();
        }

        // --- Play/pause ---
        function playSong() { if (playlist.length === 0) return; socket.emit("play", audio.currentTime); }
        function pauseSong() { socket.emit("pause", audio.currentTime); }

        // --- Handle audio end ---
        audio.onended = () => {
            if (playlist.length === 0) return;
            const nextIndex = mode === "ordered"
                ? (currentIndex + 1) % playlist.length
                : Math.floor(Math.random() * playlist.length);
            socket.emit("next", nextIndex);
        };

        // --- Socket events ---
        socket.on("updatePlaylist", (updated) => {
            const currentSongId = playlist[currentIndex]?.trackId;
            playlist = updated;
            renderPlaylist();

            const newIndex = playlist.findIndex(s => s.trackId === currentSongId);
            currentIndex = newIndex !== -1 ? newIndex : 0;

            loadCurrentSong();
            if (!audio.paused) audio.play().catch(() => {});
        });

        socket.on("syncState", (state) => {
            playlist = state.playlist;
            currentIndex = state.currentIndex;
            mode = state.mode;
            renderPlaylist();
            loadCurrentSong();
            if (state.isPlaying) audio.play().catch(() => {});
        });

        socket.on("play", (time) => {
            audio.currentTime = time;
            audio.play().catch(() => {});
        });

        socket.on("pause", (time) => {
            audio.currentTime = time;
            audio.pause();
        });

        socket.on("next", (index) => {
            if (playlist.length === 0) return;
            currentIndex = index;
            loadCurrentSong();
            audio.play().catch(() => {});
        });

        socket.on("updateMode", (newMode) => {
            mode = newMode;
        });
    </script>
</body>
</html>
